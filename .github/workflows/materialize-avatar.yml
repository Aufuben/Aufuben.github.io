name: Materialize avatar image

on:
  push:
    paths:
      - assets/Yumo.svg
      - .github/workflows/materialize-avatar.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode-avatar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode avatar from SVG
        run: |
          # Decode the existing text-safe SVG payload into a real JPG file.
          perl -0ne 'print $1 if /base64,([^\"]+)/' assets/Yumo.svg | base64 -d > assets/Yumo.jpg
          test -s assets/Yumo.jpg
          file assets/Yumo.jpg
      - name: Commit decoded avatar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/Yumo.jpg
          if git diff --cached --quiet; then
            echo "Avatar already up to date."
          else
            git commit -m "Add avatar image"
            git push
          fi
