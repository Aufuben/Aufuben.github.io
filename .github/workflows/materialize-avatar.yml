name: Materialize avatar image

on:
  push:
    paths:
      - assets/Yumo.jpg.b64
      - .github/workflows/materialize-avatar.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode-avatar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode avatar from clean base64 source
        run: |
          python3 - <<'PY'
          import base64
          from pathlib import Path

          source = Path('assets/Yumo.jpg.b64').read_text().strip()
          image = base64.b64decode(source, validate=True)
          assert image[:3] == b'\xff\xd8\xff', 'decoded file is not a JPEG'
          Path('assets/Yumo.jpg').write_bytes(image)
          print(f'wrote assets/Yumo.jpg ({len(image)} bytes)')
          PY
      - name: Commit decoded avatar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/Yumo.jpg
          if git diff --cached --quiet; then
            echo "Avatar already up to date."
          else
            git commit -m "Add avatar image"
            git push
          fi
