name: Materialize avatar image

on:
  push:
    paths:
      - assets/Yumo.jpg.b64
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode-avatar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode avatar
        run: |
          base64 -d assets/Yumo.jpg.b64 > assets/Yumo.jpg
          test -s assets/Yumo.jpg
          file assets/Yumo.jpg
      - name: Commit decoded avatar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/Yumo.jpg
          if git diff --cached --quiet; then
            echo "Avatar already up to date."
          else
            git commit -m "Add avatar image"
            git push
          fi
